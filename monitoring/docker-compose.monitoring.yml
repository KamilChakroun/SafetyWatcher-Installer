# ================================================================
#  Safety Watcher — Monitoring Stack
#
#  Run alongside the main app:
#    docker compose -f docker-compose.yml \
#                   -f monitoring/docker-compose.monitoring.yml \
#                   up -d
#
#  Or start monitoring only (services must already be running):
#    docker compose -f monitoring/docker-compose.monitoring.yml up -d
#
#  Access:
#    Grafana   → http://localhost:3000  (admin / admin)
#    Prometheus → http://localhost:9090
#
#  GPU metrics (add --profile gpu when on the GPU machine):
#    docker compose -f docker-compose.yml \
#                   -f monitoring/docker-compose.monitoring.yml \
#                   --profile gpu up -d
# ================================================================

services:

  # ── Prometheus — metrics collection ───────────────────────────
  prometheus:
    image: safety-watcher-prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - default

  # ── Grafana — dashboards + alerts ─────────────────────────────
  grafana:
    image: safety-watcher-grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - default

  # ── Loki — log storage ────────────────────────────────────────
  loki:
    image: safety-watcher-loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - default

  # ── Promtail — ships Docker container logs to Loki ────────────
  promtail:
    image: safety-watcher-promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki
    networks:
      - default

  # ── cAdvisor — per-container CPU/RAM/network metrics ──────────
  cadvisor:
    image: safety-watcher-cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - default

  # ── NATS exporter — translates NATS /varz to Prometheus format ──
  nats-exporter:
    image: safety-watcher-nats-exporter:latest
    container_name: nats-exporter
    restart: unless-stopped
    command: -varz -connz -routez -subz "http://nats:8222"
    ports:
      - "7777:7777"
    networks:
      - default

  # ── NVIDIA GPU exporter — GPU metrics (GPU machine only) ──────
  # Start with: --profile gpu
  nvidia-exporter:
    image: safety-watcher-nvidia-exporter:latest
    container_name: nvidia-exporter
    restart: unless-stopped
    profiles: [gpu]
    ports:
      - "9835:9835"
    volumes:
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so:ro
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
    networks:
      - default

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  default:
    name: safety-watcher_default