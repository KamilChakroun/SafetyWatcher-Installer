# This is a docker-compose override to enable NATS monitoring port.
# Merge with main compose:
#   docker compose -f docker-compose.yml \
#                  -f monitoring/docker-compose.monitoring.yml \
#                  -f monitoring/docker-compose.nats-monitor.yml \
#                  up -d
#
# Or add this to your main docker-compose nats service manually:
#   ports:
#     - "4222:4222"
#     - "8222:8222"   ← add this
#   command: ["--http_port", "8222"]  ← add this

services:
  nats:
    ports:
      - "8222:8222"
    command: ["--http_port", "8222"]