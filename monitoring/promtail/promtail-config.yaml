server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect logs from ALL Docker containers, labelled by container name and service
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the instance label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Use the compose service name as the service label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Keep the image name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_image']
        target_label: image